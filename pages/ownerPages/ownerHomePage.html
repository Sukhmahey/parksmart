<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="/pages/userPages/Assets/fevicon.svg"
      type="image/svg+xml"
    />
    <title>Parking Listings</title>
    <link rel="stylesheet" href="/index-header.css" />
    <link rel="stylesheet" href="/pages/ownerPages/css/styles_ownerHomePage.css" />
    <script type="module" src="/pages/ownerPages/ownerHomePage.js" defer></script>
  </head>
  <body>
    <header>
      <div class="icon" id="logo">
        <img src="/pages/userPages/Assets/Logo-FullSize.svg" alt="" />
      </div>
      <h1 class="username">Hello, <span id="username"></span></h1>

      <div class="hamburger-menu" id="hamburgerMenu">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
      <nav id="navMenu" class="nav-menu">
        <a href="../userPages/homepage.html">Switch to User</a>
        <a href="./bookingHistory.html">Bookings</a>
      </nav>
    </header>
    <div class="container">
      <main>
        <h2>Your Listings</h2>
        <div class="listings" id="listings">
          <!-- <button class="removeAll">&#128465; Remove All</button> -->
          <div id="listingarea"></div>
          <div id="noListings">
            <p>No listings available.</p>
          </div>
        </div>
        <a class="add-listing-a" href="addListingPage.html">
          <button class="add-listing">Add New Listings</button>
        </a>
      </main>
    </div>
    <footer class="app-footer">
      <div class="footer-inner">
        <div class="footer-brand">ParkSmart</div>
        <div class="footer-right">
          <div class="footer-links">
            <a href="mailto:parksmart@gmail.com">Contact</a>
            <span class="footer-dot">·</span>
            <a href="/pages/userPages/homepage.html">Find parking</a>
          </div>
          <div class="footer-social">
            <a href="#" aria-label="Facebook"><img src="/pages/userPages/Assets/vecteezy_facebook-logo-png-facebook-icon-transparent-png_18930698.png" alt="Facebook" /></a>
            <a href="#" aria-label="Instagram"><img src="/pages/userPages/Assets/vecteezy_instagram-logo-png-instagram-icon-transparent_18930415.png" alt="Instagram" /></a>
            <a href="#" aria-label="Twitter"><img src="/pages/userPages/Assets/vecteezy_twitter-new-logo-twitter-icons-new-twitter-logo-x-2023-x_31737215.png" alt="Twitter" /></a>
          </div>
          <span class="footer-copy">&copy; 2025 ParkSmart</span>
        </div>
      </div>
    </footer>

    <script>
      const hamburgerMenu = document.getElementById("hamburgerMenu");
      const navMenu = document.getElementById("navMenu");

      hamburgerMenu.addEventListener("click", () => {
        navMenu.classList.toggle("active");
      });
    </script>
  </body>
</html>
