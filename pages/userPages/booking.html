<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Confirmed | ParkSmart</title>
    <link rel="icon" href="/pages/userPages/Assets/fevicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/index-header.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/pages/userPages/booking.css" />
  </head>
  <body id="bookingPage">
    <header class="main-header">
      <div class="logoContainer" id="logo">
        <img src="/pages/userPages/Assets/Logo-FullSize.svg" alt="ParkSmart" class="logo-img" />
      </div>
      <a href="/pages/userPages/userSettings.html" class="profile-link">
        <img class="profileIcon" src="/pages/userPages/Assets/avatar-svg.svg" alt="Profile" />
      </a>
    </header>

    <main class="booking-main">
      <div class="booking-container">
        <div class="confirmation-hero">
          <div class="confirmation-icon-wrap">
            <i class="fa-solid fa-circle-check" aria-hidden="true"></i>
          </div>
          <h1 class="confirmation-title">Booking confirmed</h1>
          <p class="confirmation-message">Your parking spot is reserved. Details are below.</p>
        </div>

        <div class="booking-layout">
          <section class="booking-summary-card">
            <div class="summary-image-wrap">
              <img id="parkingImage" class="summary-image" src="https://images.pexels.com/photos/9800031/pexels-photo-9800031.jpeg?auto=compress&amp;cs=tinysrgb&amp;w=800&amp;h=500&amp;fit=crop" alt="Parking spot" />
            </div>
            <div class="summary-body">
              <h2 id="parkingTitle" class="summary-title">Parking spot</h2>
              <p id="parkingLocation" class="summary-address">
                <i class="fa-solid fa-map-pin" aria-hidden="true"></i>
                <span>Address</span>
              </p>
              <div class="owner-block">
                <p class="owner-row">
                  <i class="fa-solid fa-user" aria-hidden="true"></i>
                  <span><strong>Host</strong> <span id="ownerName">—</span></span>
                </p>
                <p class="owner-row">
                  <i class="fa-solid fa-envelope" aria-hidden="true"></i>
                  <span><strong>Contact</strong> <a id="ownerContact" href="#">—</a></span>
                </p>
              </div>
            </div>
          </section>

          <section class="booking-details-card">
            <h3 class="details-heading">Booking details</h3>
            <dl class="details-list">
              <div class="detail-row">
                <dt>Date</dt>
                <dd id="parkingDate">—</dd>
              </div>
              <div class="detail-row">
                <dt>Time</dt>
                <dd id="parkingTime">—</dd>
              </div>
              <div class="detail-row">
                <dt>Duration</dt>
                <dd id="parkingDuration">—</dd>
              </div>
              <div class="detail-row detail-total">
                <dt>Total</dt>
                <dd id="totalPrice">$0.00</dd>
              </div>
            </dl>
            <div class="booking-actions">
              <a href="/pages/userPages/homepage.html" class="btn btn-primary" id="backToHome">Back to home</a>
              <a href="/pages/userPages/homepage.html" class="btn btn-secondary">Find more parking</a>
            </div>
          </section>
        </div>
      </div>
    </main>

    <footer class="app-footer">
      <div class="footer-inner">
        <div class="footer-brand">ParkSmart</div>
        <div class="footer-right">
          <div class="footer-links">
            <a href="mailto:parksmart@gmail.com">Contact</a>
            <span class="footer-dot">·</span>
            <a href="/pages/userPages/homepage.html">Find parking</a>
          </div>
          <div class="footer-social">
            <a href="#" aria-label="Facebook"><img src="/pages/userPages/Assets/vecteezy_facebook-logo-png-facebook-icon-transparent-png_18930698.png" alt="Facebook" /></a>
            <a href="#" aria-label="Instagram"><img src="/pages/userPages/Assets/vecteezy_instagram-logo-png-instagram-icon-transparent_18930415.png" alt="Instagram" /></a>
            <a href="#" aria-label="Twitter"><img src="/pages/userPages/Assets/vecteezy_twitter-new-logo-twitter-icons-new-twitter-logo-x-2023-x_31737215.png" alt="Twitter" /></a>
          </div>
          <span class="footer-copy">&copy; 2025 ParkSmart</span>
        </div>
      </div>
    </footer>

    <script type="module" src="/js/booking.js"></script>
  </body>
</html>
