<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find Parking | ParkSmart</title>
    <link rel="icon" href="/pages/userPages/Assets/fevicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/index-header.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="/pages/userPages/styles.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <script defer type="module" src="/pages/userPages/searchResultsPage.js"></script>
  </head>
  <body>
    <header class="desktopHeader">
      <div class="logoContainer" id="logo">
        <img src="/pages/userPages/Assets/Logo-FullSize.svg" alt="ParkSmart Logo" />
      </div>
      <a
        href="#"
        id="back-btn"
        onclick="goBack()"
        class="back-button-searchResult"
      ></a>
      <div class="headerRight">
        <form
          class="searchBoxContainer"
          id="searchBoxContainer"
          autocomplete="off"
        >
          <div class="searchInputContainer">
            <input
              type="text"
              id="location"
              name="location"
              placeholder="Search for Parking Location"
              autocomplete="off"
            />
          </div>
          <input type="datetime-local" id="datetime" name="datetime" />
          <div class="headerButtonContainer">
            <button type="submit" id="searchBtn">
              <img src="/pages/userPages/Assets/search.svg" alt="Search Icon" />
            </button>
            <button type="submit" id="filterBtn">
              <img src="/pages/userPages/Assets/filter.svg" alt="Filter Icon" />
            </button>
            <div class="filter-box" id="filterBox">
              <label>Sort by:</label>
              <select id="sort-options">
                <option value="distance">Sort by Distance</option>
                <option value="price">Sort by Price</option>
              </select>
              <label>Search radius:</label>
              <input id="radius" type="number" value="25" />

              <button id="filterBoxbtn">Filter</button>
            </div>
          </div>
        </form>
      </div>
      <a href="userSettings.html"
        ><img
          class="profileIcon"
          src="/pages/userPages/Assets/avatar-svg.svg"
          alt="Profile Icon"
      /></a>
    </header>

    <main>
      <div class="mapOuterContainer">
        <div id="map"></div>
        <aside class="sidebar">
          <div class="parking-list"></div>
        </aside>
      </div>
      <div id="marker-overlay" class="marker-overlay">
        <img id="overlay-img" alt="Location Image" />
        <p id="overlay-text"></p>
      </div>
    </main>
    <footer class="app-footer">
      <div class="footer-inner">
        <div class="footer-brand">ParkSmart</div>
        <div class="footer-right">
          <div class="footer-links">
            <a href="mailto:parksmart@gmail.com">Contact</a>
            <span class="footer-dot">·</span>
            <a href="/pages/userPages/homepage.html">Find parking</a>
          </div>
          <div class="footer-social">
            <a href="#" aria-label="Facebook"><img src="/pages/userPages/Assets/vecteezy_facebook-logo-png-facebook-icon-transparent-png_18930698.png" alt="Facebook" /></a>
            <a href="#" aria-label="Instagram"><img src="/pages/userPages/Assets/vecteezy_instagram-logo-png-instagram-icon-transparent_18930415.png" alt="Instagram" /></a>
            <a href="#" aria-label="Twitter"><img src="/pages/userPages/Assets/vecteezy_twitter-new-logo-twitter-icons-new-twitter-logo-x-2023-x_31737215.png" alt="Twitter" /></a>
          </div>
          <span class="footer-copy">&copy; 2025 ParkSmart</span>
        </div>
