<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Find and book parking spots easily with ParkSmart. Hassle-free parking wherever you go!"
    />
    <link rel="icon" href="/pages/userPages/Assets/fevicon.svg" type="image/svg+xml" />
    <title>ParkSmart - Settings</title>
    <link rel="stylesheet" href="/index-header.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="/styles/userSettingPage.css" />
    <script type="module" src="/pages/userPages/userSettings.js" defer></script>
    <script type="module" src="/js/main.js" defer></script>
  </head>

  <body>
    <header>
      <div class="logoContainer" id="logo">
        <img src="/pages/userPages/Assets/Logo-FullSize.svg" alt="ParkSmart Logo" />
      </div>
      
    </header>
    <main>
      <h1>My Profile</h1>
      <div class="settingsWrapper">
       
        <div class="settingsContainer">
          <h2>Account Settings</h2>
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" value="John" readonly />
    
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" value="Doe" readonly />
    
          <label for="email">Email</label>
          <input type="email" id="email" value="john.doe@example.com" readonly />
    
          <label for="phone">Phone Number</label>
          <input type="text" id="phone" value="+1234567890" readonly />


<!-- Password Fields (hidden by default) -->
<div id="passwordFields" style="display: none;">
  <label for="newPassword">New Password</label>
  <input type="password" id="newPassword" placeholder="New Password" />
  <i class="fa-solid fa-eye" id="togglePasswordIcon"></i>
  <label for="confirmPassword">Confirm Password</label>
  <input type="password" id="confirmPassword" placeholder="Confirm Password" />
  <i class="fa-solid fa-eye" id="toggleConfirmPasswordIcon"></i>
  <button id="savePasswordBtn">Save Password</button>
  <button id="cancelPasswordBtn">Cancel</button>

</div>

    
          <div class="buttons">
            <button class="edit-btn">Edit Details</button>
            <button class="save-btn">Save</button>
            <button id="changePasswordBtn" type="button">Change Password</button>
            
          </div>
        </div>

<div class="logOutContainer">
      <button id="logoutBtn"> Log Out</button>
    </div>
       
      </div>

      
    </main>
    
    <footer class="app-footer">
      <div class="footer-inner">
        <div class="footer-brand">ParkSmart</div>
        <div class="footer-right">
          <div class="footer-links">
            <a href="mailto:parksmart@gmail.com">Contact</a>
            <span class="footer-dot">·</span>
            <a href="/pages/userPages/homepage.html">Find parking</a>
          </div>
          <div class="footer-social">
            <a href="#" aria-label="Facebook"><img src="/pages/userPages/Assets/vecteezy_facebook-logo-png-facebook-icon-transparent-png_18930698.png" alt="Facebook" /></a>
            <a href="#" aria-label="Instagram"><img src="/pages/userPages/Assets/vecteezy_instagram-logo-png-instagram-icon-transparent_18930415.png" alt="Instagram" /></a>
            <a href="#" aria-label="Twitter"><img src="/pages/userPages/Assets/vecteezy_twitter-new-logo-twitter-icons-new-twitter-logo-x-2023-x_31737215.png" alt="Twitter" /></a>
          </div>
          <span class="footer-copy">&copy; 2025 ParkSmart</span>
        </div>
      </div>
    </footer>
  </body>
</html>
