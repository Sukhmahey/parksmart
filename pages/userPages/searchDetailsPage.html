<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parking Spot Detail</title>
    <link rel="stylesheet" href="/index-header.css" />
    <link rel="stylesheet" href="/pages/userPages/styles.css" />
    <link rel="icon" href="/pages/userPages/Assets/fevicon.svg" type="image/svg+xml" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <script defer type="module" src="/pages/userPages/searchDetailsPage.js"></script>
  </head>
  <body id="searchDetailsPage">
    <header>
      <div class="logoContainer" id="logo">
        <img src="/pages/userPages/Assets/Logo-FullSize.svg" alt="ParkSmart Logo" />
      </div>
      <a
        href="#"
        id="back-btn-header"
        onclick="goBack()"
        class="back-button-searchResult"
      ></a>

      <a href="userSettings.html"
        ><img
          class="profileIcon"
          src="/pages/userPages/Assets/avatar-svg.svg"
          alt="Profile Icon"
      /></a>
    </header>

    <main class="detail-page-main">
      <a href="#" id="back-btn" onclick="goBack()" class="back-button-details">Go Back</a>
      <div class="outerContainer detail-page-container">
        <div id="imageSlider" class="image-slider" aria-label="Parking spot photo"></div>
        <section id="parkingDetails" class="parking-details" aria-label="Parking details"></section>
      </div>
    </main>
    <footer class="app-footer">
      <div class="footer-inner">
        <div class="footer-brand">ParkSmart</div>
        <div class="footer-right">
          <div class="footer-links">
            <a href="mailto:parksmart@gmail.com">Contact</a>
            <span class="footer-dot">·</span>
            <a href="/pages/userPages/homepage.html">Find parking</a>
          </div>
          <div class="footer-social">
            <a href="#" aria-label="Facebook"><img src="/pages/userPages/Assets/vecteezy_facebook-logo-png-facebook-icon-transparent-png_18930698.png" alt="Facebook" /></a>
            <a href="#" aria-label="Instagram"><img src="/pages/userPages/Assets/vecteezy_instagram-logo-png-instagram-icon-transparent_18930415.png" alt="Instagram" /></a>
            <a href="#" aria-label="Twitter"><img src="/pages/userPages/Assets/vecteezy_twitter-new-logo-twitter-icons-new-twitter-logo-x-2023-x_31737215.png" alt="Twitter" /></a>
          </div>
          <span class="footer-copy">&copy; 2025 ParkSmart</span>
        </div>
      </div>
    </footer>
  </body>
